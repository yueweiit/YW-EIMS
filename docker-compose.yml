services:
  postgres:
    image: postgres:16-alpine
    container_name: yw-eims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eims}
      POSTGRES_USER: ${POSTGRES_USER:-eims}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the root .env file}
    volumes:
      - eims-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yw-eims-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-eims}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eims}?schema=public
    env_file:
      - ./backend/.env
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SERVICE_BASE_URL: /api
    container_name: yw-eims-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8003}:80"

volumes:
  eims-postgres-data:
